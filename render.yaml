# ───────────────────────────────────────────────────────────────────────────
# ALDIAFAH — Render Blueprint (no purchased domain required)
#
# Render gives every service a free HTTPS subdomain (*.onrender.com), so the
# whole platform runs over real TLS with no domain to buy. Deploy by pushing
# this repo and creating a "Blueprint" in Render (see infra/RENDER_DEPLOYMENT.md).
#
# Resulting URLs (for a fresh account — if a name is taken Render appends a
# random suffix, then update CORS_ORIGINS / NEXT_PUBLIC_API_URL accordingly):
#   API    https://aldiafa-api.onrender.com
#   Admin  https://aldiafa-admin.onrender.com
#   Staff  https://aldiafa-staff.onrender.com
# ───────────────────────────────────────────────────────────────────────────

databases:
  - name: aldiafa-db
    databaseName: aldiafa
    user: aldiafa
    plan: free

services:
  # ── Backend API (NestJS) ───────────────────────────────────────────────────
  - type: web
    name: aldiafa-api
    runtime: docker
    plan: free
    rootDir: apps/backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: aldiafa-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://aldiafa-admin.onrender.com,https://aldiafa-staff.onrender.com
      # Seed admin (created on first run of `pnpm prisma:seed`)
      - key: SEED_ADMIN_EMAIL
        value: admin@aldiafah.com
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_PHONE
        value: "+966500000000"
      # Providers default to dev/no-op adapters so the API boots with zero keys.
      - key: STORAGE_PROVIDER
        value: local
      - key: MAPS_PROVIDER
        value: dev
      - key: SMS_PROVIDER
        value: console
      - key: PUSH_PROVIDER
        value: console
      - key: MAIL_PROVIDER
        value: console
      - key: PAYMENT_PROVIDER
        value: console
      - key: PAYMENT_CALLBACK_URL
        value: https://aldiafa-api.onrender.com/api/payments/callback

  # ── Admin dashboard (Next.js) ──────────────────────────────────────────────
  - type: web
    name: aldiafa-admin
    runtime: docker
    plan: free
    dockerfilePath: apps/admin/Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      # NEXT_PUBLIC_* is inlined at build time; Render exposes env vars as build
      # args, so this reaches the Dockerfile's `ARG NEXT_PUBLIC_API_URL`.
      - key: NEXT_PUBLIC_API_URL
        value: https://aldiafa-api.onrender.com/api

  # ── Employee dashboard (Next.js) ───────────────────────────────────────────
  - type: web
    name: aldiafa-staff
    runtime: docker
    plan: free
    dockerfilePath: apps/employee/Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://aldiafa-api.onrender.com/api
