name: aldiafa
description: "ALDIAFAH — الضيافة customer app"
publish_to: 'none'
version: 1.0.11+12

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # Maps & location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Media & UI
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: ^0.20.2

  # Firebase (push notifications)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Pin the Apple-only path_provider_foundation to a version that does not pull in
# `objective_c`, which triggers the experimental Dart native-assets hook and fails
# to build when the Flutter SDK lives at a path containing spaces.
dependency_overrides:
  path_provider_foundation: 2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/icons/
    - assets/category-icons/
    - assets/products/
    - assets/backgrounds/
    - assets/illustrations/
    - assets/particles/
    - assets/shadows/
    - assets/animations/
