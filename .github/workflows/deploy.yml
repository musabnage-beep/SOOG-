name: Deploy

# Deploys the full stack to the production host. The host pulls the latest code
# and rebuilds the images via infra/docker-compose.prod.yml (build-on-host).
#
# Required repository secrets:
#   DEPLOY_HOST     EC2 public DNS / IP
#   DEPLOY_USER     ssh user (e.g. ubuntu)
#   DEPLOY_SSH_KEY  private key with access to the host
#   DEPLOY_PATH     (optional) checkout path on host, defaults to /opt/aldiafa
#
# One-time host setup (see infra/AWS_DEPLOYMENT.md):
#   - docker + compose plugin installed
#   - repo cloned at DEPLOY_PATH
#   - infra/.env populated (copied from infra/.env.example)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "${DEPLOY_PATH:-/opt/aldiafa}"
            git fetch --all
            git reset --hard origin/main
            docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d --build
            docker image prune -f
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
