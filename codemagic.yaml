workflows:
  ios-release:
    name: iOS Release — الضيافة
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials   # ASC_KEY_ID, ASC_ISSUER_ID, ASC_PRIVATE_KEY
        - google_maps             # GOOGLE_MAPS_API_KEY
      vars:
        BUNDLE_ID: com.aldiafah.aldiafa
        APP_STORE_APP_ID: "6791276970"

    scripts:
      - name: Install Flutter dependencies
        script: |
          cd apps/mobile
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd apps/mobile/ios
          pod install

      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files \
            --bundle-id "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --issuer-id "$ASC_ISSUER_ID" \
            --key-id "$ASC_KEY_ID" \
            --private-key "@env:ASC_PRIVATE_KEY" \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Inject Google Maps API key
        script: |
          XCCONFIG="apps/mobile/ios/Flutter/Release.xcconfig"
          echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" >> "$XCCONFIG"

      - name: Build iOS IPA
        script: |
          cd apps/mobile
          flutter build ipa --release \
            --build-name=1.0.7 \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - apps/mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $ASC_PRIVATE_KEY
        key_id: $ASC_KEY_ID
        issuer_id: $ASC_ISSUER_ID
        submit_to_testflight: true

  android-release:
    name: Android Release — الضيافة
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      groups:
        - google_maps   # GOOGLE_MAPS_API_KEY
      vars:
        PACKAGE_NAME: com.aldiafah.aldiafa

    scripts:
      - name: Set TMP path
        script: export TMP=/tmp && export TEMP=/tmp

      - name: Install Flutter dependencies
        script: |
          cd apps/mobile
          flutter pub get

      - name: Build APK
        script: |
          cd apps/mobile
          flutter build apk --release \
            --build-name=1.0.7 \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - apps/mobile/build/app/outputs/flutter-apk/app-release.apk
