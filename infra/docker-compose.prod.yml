# ───────────────────────────────────────────────────────────────────────────
# ALDIAFAH — full production stack (single host / EC2)
# Run from repo root:
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d --build
#
# nginx terminates HTTP(S) and reverse-proxies:
#   api.<domain>      → api:3000
#   admin.<domain>    → admin:3100
#   staff.<domain>    → employee:3200
# On managed AWS you would instead use RDS (Postgres), S3 (uploads) and an ALB.
# ───────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    container_name: aldiafa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aldiafa

  api:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    image: aldiafa-api:latest
    container_name: aldiafa-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_PHONE: ${SEED_ADMIN_PHONE}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      MAPS_PROVIDER: ${MAPS_PROVIDER:-dev}
      SMS_PROVIDER: ${SMS_PROVIDER:-dev}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-dev}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-dev}
      AWS_REGION: ${AWS_REGION:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      - uploads:/app/uploads
    networks:
      - aldiafa

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${ADMIN_PUBLIC_API_URL}
    image: aldiafa-admin:latest
    container_name: aldiafa-admin
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3100
    networks:
      - aldiafa

  employee:
    build:
      context: ..
      dockerfile: apps/employee/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${EMPLOYEE_PUBLIC_API_URL}
    image: aldiafa-employee:latest
    container_name: aldiafa-employee
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3200
    networks:
      - aldiafa

  nginx:
    image: nginx:1.27-alpine
    container_name: aldiafa-nginx
    restart: unless-stopped
    depends_on:
      - api
      - admin
      - employee
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - aldiafa

volumes:
  pgdata:
  uploads:

networks:
  aldiafa:
    driver: bridge
