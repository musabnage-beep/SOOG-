# ───────────────────────────────────────────────────────────────────────────
# ALDIAFAH virtual hosts for aldiafah.com (api / admin / staff subdomains).
#
# HTTPS blocks are commented out until certs exist. To enable TLS:
#   1. point DNS A records: api / admin / staff  → this host
#   2. run certbot (see infra/AWS_DEPLOYMENT.md) to populate ./certbot/conf
#   3. uncomment the 443 servers + the http→https redirect, reload nginx
# ───────────────────────────────────────────────────────────────────────────

# Shared proxy headers
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── ACME challenge (Let's Encrypt) ──────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Before TLS is set up everything is served over plain HTTP.
    # After TLS: replace the block below with `return 301 https://$host$request_uri;`
    location / {
        return 444;
    }
}

# ── API: api.aldiafah.com ───────────────────────────────────────────────
server {
    listen 80;
    server_name api.aldiafah.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        proxy_pass         http://aldiafa_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── Admin dashboard: admin.aldiafah.com ─────────────────────────────────
server {
    listen 80;
    server_name admin.aldiafah.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        proxy_pass         http://aldiafa_admin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# ── Employee dashboard: staff.aldiafah.com ──────────────────────────────
server {
    listen 80;
    server_name staff.aldiafah.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        proxy_pass         http://aldiafa_employee;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

