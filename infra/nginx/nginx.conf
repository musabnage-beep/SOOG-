user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size 25m;  # product image uploads

    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      application/x-javascript text/xml application/xml image/svg+xml;

    # ── upstreams ────────────────────────────────────────────────────────────
    upstream aldiafa_api      { server api:3000;      keepalive 32; }
    upstream aldiafa_admin    { server admin:3100;    keepalive 32; }
    upstream aldiafa_employee { server employee:3200; keepalive 32; }

    include /etc/nginx/conf.d/*.conf;
}
