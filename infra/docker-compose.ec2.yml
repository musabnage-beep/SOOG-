# ───────────────────────────────────────────────────────────────────────────
# ALDIAFAH — EC2 / bare-IP deployment (no domain required)
#
# Usage (from repo root on the EC2 host):
#   cp infra/.env.ec2.example infra/.env.ec2
#   nano infra/.env.ec2          # fill YOUR_IP + secrets
#   docker compose -f infra/docker-compose.ec2.yml --env-file infra/.env.ec2 up -d --build
#
# Resulting URLs:
#   API    http://YOUR_IP:3000/api
#   Admin  http://YOUR_IP:3100
#   Staff  http://YOUR_IP:3200
# ───────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL (data persisted in a named Docker volume) ─────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aldiafa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aldiafa
    # postgres is NOT exposed externally — only reachable inside Docker network

  # ── NestJS API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    image: aldiafa-api:latest
    container_name: aldiafa-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://18.194.190.26:3100,http://18.194.190.26:3200,http://18.194.190.26:3300}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@aldiafah.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe!2026}
      SEED_ADMIN_PHONE: ${SEED_ADMIN_PHONE:-+966500000000}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      MAPS_PROVIDER: ${MAPS_PROVIDER:-dev}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-console}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-console}
      AWS_REGION: ${AWS_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-console}
      MOYASAR_SECRET_KEY: ${MOYASAR_SECRET_KEY:-}
      MOYASAR_WEBHOOK_SECRET: ${MOYASAR_WEBHOOK_SECRET:-}
      PAYMENT_CALLBACK_URL: ${PAYMENT_CALLBACK_URL:-}
      # SMS — Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      # Push — Firebase (service account JSON mounted as volume)
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase-service-account.json
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
    volumes:
      - uploads:/app/uploads
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    networks:
      - aldiafa

  # ── Admin dashboard (Next.js) ──────────────────────────────────────────────
  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${ADMIN_PUBLIC_API_URL}
    image: aldiafa-admin:latest
    container_name: aldiafa-admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3100:3100"
    environment:
      NODE_ENV: production
      PORT: "3100"
    networks:
      - aldiafa

  # ── Employee dashboard (Next.js) ───────────────────────────────────────────
  employee:
    build:
      context: ..
      dockerfile: apps/employee/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${EMPLOYEE_PUBLIC_API_URL}
    image: aldiafa-employee:latest
    container_name: aldiafa-employee
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3200:3200"
    environment:
      NODE_ENV: production
      PORT: "3200"
    networks:
      - aldiafa

volumes:
  pgdata:          # Postgres data — survives container restarts & rebuilds
    driver: local
  uploads:         # Locally-stored product images
    driver: local

networks:
  aldiafa:
    driver: bridge
